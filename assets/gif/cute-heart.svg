<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320">
<style>
.heart{transform-origin:200px 160px;animation:pulse 1s ease-in-out infinite}.eye{animation:blink 2.6s infinite}.spark{animation:float 1.8s ease-in-out infinite alternate}.spark:nth-child(2){animation-delay:.3s}.spark:nth-child(3){animation-delay:.6s}@keyframes pulse{50%{transform:scale(1.08)}}@keyframes blink{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(.08)}}@keyframes float{to{transform:translateY(-14px);opacity:.5}}</style>
<rect width="400" height="320" fill="none"/>
<g class="spark" fill="#ff87c0"><circle cx="70" cy="78" r="10"/><circle cx="330" cy="95" r="8"/></g>
<g class="spark" fill="#ffd2e8"><circle cx="92" cy="235" r="8"/><circle cx="310" cy="240" r="12"/></g>
<path class="heart" d="M200 278C92 196 42 146 42 83 42 31 83 4 128 4c31 0 55 15 72 43 17-28 41-43 72-43 45 0 86 27 86 79 0 63-50 113-158 195z" fill="#ff5fa8"/>
<g transform="translate(0 8)"><ellipse class="eye" cx="155" cy="122" rx="14" ry="19" fill="#421225"/><ellipse class="eye" cx="245" cy="122" rx="14" ry="19" fill="#421225"/><path d="M165 175q35 38 70 0" fill="none" stroke="#421225" stroke-width="13" stroke-linecap="round"/><circle cx="121" cy="160" r="20" fill="#ffb5d6" opacity=".8"/><circle cx="279" cy="160" r="20" fill="#ffb5d6" opacity=".8"/></g>
</svg>